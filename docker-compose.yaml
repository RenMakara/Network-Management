version: '3.9'

services:

  # Redis — main data store for DDoS protection
  redis:
    image: redis:8-alpine
    container_name: ddos-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Commander — visual UI to watch Redis keys while testing
  # Open: http://localhost:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ddos-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data: